<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen text-gray-800 font-sans">

    <div class="text-center p-6 max-w-md">
        <h1 class="text-6xl font-bold text-[#007bff] mb-4">404</h1>
        <h2 class="text-2xl font-semibold mb-2">Oops! Page not found</h2>
        <p class="text-gray-600 mb-6">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="/" class="inline-block bg-[#007bff] hover:bg-[#0056b3] text-white font-medium py-2 px-6 rounded-lg transition duration-200">
            Go Back Home
        </a>
    </div>

</body>
</html>
